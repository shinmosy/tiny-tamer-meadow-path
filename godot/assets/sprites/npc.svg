  <path d="M 68 50 Q 75 60 70 70" fill="none" stroke="#eeeeee" stroke-width="8" stroke-linecap="round"/>
  <!-- hands -->
  <circle cx="30" cy="70" r="4" fill="#ffccbc"/>
  <circle cx="70" cy="70" r="4" fill="#ffccbc"/>
  <!-- head -->
  <circle cx="50" cy="30" r="18" fill="#ffccbc" stroke="#d84315" stroke-width="2"/>
