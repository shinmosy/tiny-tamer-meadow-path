  <path d="M 30 30 A 20 20 0 0 1 70 30 Q 78 40 66 20 Q 50 10 34 20 Q 22 40 30 30 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="2"/>
  <!-- glasses -->
  <rect x="36" y="26" width="10" height="6" rx="2" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <rect x="54" y="26" width="10" height="6" rx="2" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <line x1="46" y1="29" x2="54" y2="29" stroke="#1565c0" stroke-width="2"/>
  <!-- mustache -->
  <path d="M 42 38 Q 50 42 58 38" fill="none" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
</svg>