  <!-- coat -->
  <path d="M 32 45 L 68 45 L 75 80 L 25 80 Z" fill="#eeeeee" stroke="#9e9e9e" stroke-width="2"/>
  <!-- tie -->
  <path d="M 47 45 L 53 45 L 50 60 Z" fill="#ef5350"/>
  <!-- arms -->
