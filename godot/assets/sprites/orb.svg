  <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#222" stroke-width="4"/>
  <!-- Top red/orange half -->
  <path d="M 2 50 A 48 48 0 0 1 98 50 Z" fill="#ff6b6b" stroke="#222" stroke-width="3"/>
  <!-- Center band -->
  <rect x="0" y="46" width="100" height="8" fill="#222"/>
  <!-- Outer button ring -->
  <circle cx="50" cy="50" r="16" fill="#222"/>
  <!-- Inner button -->
  <circle cx="50" cy="50" r="11" fill="#ffffff"/>
  <!-- Inner glow/reflection -->
