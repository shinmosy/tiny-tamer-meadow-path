<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="grad4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef5350" />
      <stop offset="100%" stop-color="#c62828" />
    </radialGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="50" cy="80" rx="22" ry="7" fill="#000" opacity="0.3"/>
  <!-- backpack -->
  <rect x="25" y="40" width="50" height="25" rx="5" fill="#fff176" stroke="#fbc02d" stroke-width="2"/>
  <!-- body/jacket -->
  <rect x="35" y="45" width="30" height="30" rx="8" fill="#1976d2" stroke="#0d47a1" stroke-width="2"/>
  <!-- arms -->
  <path d="M 35 50 Q 25 60 30 70" fill="none" stroke="#1976d2" stroke-width="8" stroke-linecap="round"/>
  <path d="M 65 50 Q 75 60 70 70" fill="none" stroke="#1976d2" stroke-width="8" stroke-linecap="round"/>
  <!-- hands -->
  <circle cx="30" cy="70" r="4" fill="#ffccbc"/>
  <circle cx="70" cy="70" r="4" fill="#ffccbc"/>
  <!-- head -->
  <circle cx="50" cy="35" r="18" fill="#ffccbc" stroke="#d84315" stroke-width="2"/>
  <!-- hat -->
  <path d="M 30 35 A 20 20 0 0 1 70 35 Z" fill="url(#grad4)" stroke="#b71c1c" stroke-width="2"/>
  <path d="M 22 35 Q 50 45 78 35" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <!-- hair -->
  <path d="M 32 35 Q 35 48 40 35" fill="#3e2723" stroke="#212121" stroke-width="1"/>
  <path d="M 68 35 Q 65 48 60 35" fill="#3e2723" stroke="#212121" stroke-width="1"/>
</svg>